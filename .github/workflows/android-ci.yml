name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Add this step to print the directory structure before building
      - name: List app directory before build
        run: ls -la app/

      - name: Build with Gradle (Debug APK)
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      # Add this step to print the directory structure after building
      - name: List app directory after build
        run: ls -la app/

      # Add this step to see if build directory was created
      - name: List build directory contents
        run: if [ -d "app/build" ]; then ls -la app/build/; else echo "app/build directory does not exist"; fi

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: vhatsai-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Run Unit Tests
        run: ./gradlew test --stacktrace --no-daemon
        continue-on-error: true

      - name: Generate Build Report
        if: always()
        run: |
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Debug APK built successfully" >> $GITHUB_STEP_SUMMARY
          echo "- 📱 Target: Android 7.0+ (API 24)" >> $GITHUB_STEP_SUMMARY
          echo "- 🧱 Compile SDK: 34" >> $GITHUB_STEP_SUMMARY
          # Try to get APK size, handle case where it doesn't exist
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            SIZE=$(du -h "app/build/outputs/apk/debug/app-debug.apk" | cut -f1)
            echo "- 📦 APK size: $SIZE" >> $GITHUB_STEP_SUMMARY
          else
            echo "- 📦 APK: File not found" >> $GITHUB_STEP_SUMMARY
          fi
