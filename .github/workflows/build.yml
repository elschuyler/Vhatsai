name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon
      env:
        GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
      
    - name: Verify APK was created
      run: |
        echo "🔍 Searching for APK files..."
        find . -name "*.apk" -type f
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "✅ APK found!"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
        else
          echo "❌ APK not found at expected path"
          exit 1
        fi
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: vhatsai-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
        if-no-files-found: error  # Fail the build if APK is missing
        
    - name: Build Summary
      run: |
        echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Debug APK built successfully" >> $GITHUB_STEP_SUMMARY
        echo "- 📱 Target: Android 7.0+ (API 24)" >> $GITHUB_STEP_SUMMARY
        echo "- 🧱 Compile SDK: 34" >> $GITHUB_STEP_SUMMARY
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          SIZE=$(du -h "app/build/outputs/apk/debug/app-debug.apk" | cut -f1)
          echo "- 📦 APK size: $SIZE" >> $GITHUB_STEP_SUMMARY
        fi
